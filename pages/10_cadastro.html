<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/Css/header.css">
    <link rel="stylesheet" href="/Css/footer.css">
    <link rel="stylesheet" href="/Css/cadrastro.css" type="text/css">
    <link rel="stylesheet" href="/Css/chatbot.css" type="text/css">
    <script src="/components/footer.js"></script>
    <script src="/components/header.js"></script>
</head>

<body>
    <header-component></header-component>

    <main>

        <div class="container">

            <section class="Cadastro-container">

                <div class="container_conteudo">
                    <div class="logo">
                        <img src="/img/Logo_Integra+.svg" alt="Logo da integra mais">
                    </div>

                    <h1>Cadastre-se</h1>

                    <form action="#">
                        <div class="campo_cadastro">
                            <label for="Nome"> Nome Completo / Nome da Empresa:</label>
                            <input type="text" id="Nome" name="Nome" placeholder="Digite seu nome ou empresa">
                        </div>

                        <div class="campo_cadastro">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" name="telefone" placeholder="Digite seu telefone">
                        </div>

                        <div class="campo_cadastro">
                            <label for="email">E-mail: </label>
                            <input type="email" id="email" name="email" placeholder="Digite seu endereço de e-mail">
                        </div>

                        <div class="campo_cadastro">
                            <label for="Senha">Senha: </label>
                            <input type="password" id="Senha" name="Senha" placeholder="Digite sua Senha">
                        </div>

                        <div class="campo_cadastro">
                            <label for="Confirme_a_Senha"> Confirme a Senha: </label>
                            <input type="password" id="Confirme_a_Senha" name="Confirme_a_Senha"
                                placeholder="Digite confirme sua senha">
                        </div>
                        <a href="/pages/11_login.html" class="entre_cadastro">Entrar</a>

                    </form>
                </div>
                <div class="lado_direito">
                    <div class="Img_cadastro">
                        <img src="/img/Rectangle 251.svg" alt="Mulher cadeirante">
                    </div>
                </div>

            </section>

    </main>
    
    <footer-componente></footer-componente>
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script>
        (function(d){
            var s = d.createElement("script");
            /* IMPORTANTE: Substitua 'SEU_ID_AQUI' pelo ID real da sua conta UserWay */
            s.setAttribute("data-account", "SEU_ID_AQUI"); 
            s.setAttribute("src", "https://cdn.userway.org/widget.js");
            (d.body || d.head).appendChild(s);
        })(document);
    </script>
    <script src="/Js/chatbot.js" defer></script>
</body>
</html>
